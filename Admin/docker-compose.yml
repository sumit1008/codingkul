version: "3.9"

services:
  admin:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/login"]
      interval: 30s
      timeout: 10s
      retries: 3
